<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Penyelesaian</title>
    <style>
        :root { --primary: #00ADB5; --dark: #e0e0e0; --bg: #1a1a2e; --card-bg: #2a2a3e; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--dark); text-align: center; padding: 20px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); margin-top: 20px; }
        .score-circle { width: 120px; height: 120px; border: 8px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .score-val { font-size: 2.5rem; font-weight: bold; color: var(--primary); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-box { background: #1e1e30; padding: 15px; border-radius: 12px; }
        .stat-label { font-size: 0.8rem; color: #aaa; }
        .stat-num { font-size: 1.2rem; font-weight: bold; color: var(--primary); }
        .btn-home { background: var(--primary); color: #1a1a2e; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; text-decoration: none; display: block; }
    </style>
</head>
<body>

    <h2 style="color: var(--primary);">Hasil Simulasi</h2>
    
    <div class="card">
        <div class="score-circle">
            <div class="score-val" id="totalScore">0</div>
        </div>
        <p style="color: #aaa;">Total Poin yang Berhasil Dikumpulkan</p>

        <div class="stat-grid">
            <div class="stat-box">
                <div class="stat-label">Soal Dikerjakan</div>
                <div class="stat-num" id="totalAnswered">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Akurasi</div>
                <div class="stat-num" id="accuracy">0%</div>
            </div>
        </div>

        <button class="btn-home" onclick="location.href='index.html'">KEMBALI KE BERANDA</button>
    </div>

    <script>
        const score = parseInt(localStorage.getItem('quizScore') || 0);
        const answeredIds = JSON.parse(localStorage.getItem('answeredIds') || "[]");
        const total = answeredIds.length;
        
        document.getElementById('totalScore').innerText = score;
        document.getElementById('totalAnswered').innerText = total;
        
        const accuracy = total > 0 ? Math.round((score / total) * 100) : 0;
        document.getElementById('accuracy').innerText = accuracy + "%";
    </script>
</body>
</html>
